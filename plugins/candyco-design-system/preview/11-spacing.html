<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Spacing scale · 4px base</div>
  <div class="col" style="gap:6px;">
    <div class="row"><div style="width:80px;" class="mono">xs · 4</div><div style="height:14px; width:4px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">sm · 8</div><div style="height:14px; width:8px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">md · 16</div><div style="height:14px; width:16px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">lg · 24</div><div style="height:14px; width:24px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">xl · 32</div><div style="height:14px; width:32px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">2xl · 48</div><div style="height:14px; width:48px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">3xl · 64</div><div style="height:14px; width:64px; background:#272838;"></div></div>
    <div class="row"><div style="width:80px;" class="mono">4xl · 96</div><div style="height:14px; width:96px; background:#272838;"></div></div>
  </div>
</div>
</body></html>
