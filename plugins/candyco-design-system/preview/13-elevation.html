<!doctype html><html><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="background:#F5F5F5;">
  <div class="eyebrow">Elevation · Six steps</div>
  <div class="row" style="gap:18px;">
    <div style="flex:1; height:84px; background:white; border-radius:10px; box-shadow:0 1px 2px rgba(39,40,56,0.06); display:flex; align-items:flex-end; padding:10px;"><span class="mono">xs</span></div>
    <div style="flex:1; height:84px; background:white; border-radius:10px; box-shadow:0 2px 4px rgba(39,40,56,0.08), 0 1px 2px rgba(39,40,56,0.04); display:flex; align-items:flex-end; padding:10px;"><span class="mono">sm</span></div>
    <div style="flex:1; height:84px; background:white; border-radius:10px; box-shadow:0 4px 12px rgba(39,40,56,0.10), 0 2px 4px rgba(39,40,56,0.06); display:flex; align-items:flex-end; padding:10px;"><span class="mono">base</span></div>
    <div style="flex:1; height:84px; background:white; border-radius:10px; box-shadow:0 12px 28px rgba(39,40,56,0.12), 0 4px 8px rgba(39,40,56,0.06); display:flex; align-items:flex-end; padding:10px;"><span class="mono">lg</span></div>
    <div style="flex:1; height:84px; background:white; border-radius:10px; box-shadow:0 24px 48px rgba(39,40,56,0.16), 0 8px 16px rgba(39,40,56,0.08); display:flex; align-items:flex-end; padding:10px;"><span class="mono">xl</span></div>
  </div>
  <div class="label">Tinted-grey shadows, never pure black.</div>
</div>
</body></html>
