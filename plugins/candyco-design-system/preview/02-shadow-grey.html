<!doctype html><html><head><meta charset="utf-8"><title>Shadow Grey Scale</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Shadow Grey · Primary scale</div>
  <div class="row" style="gap:0; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm);">
    <div style="flex:1; height:96px; background:#F2F2F4; padding:8px; display:flex; align-items:flex-end;"><span class="mono" style="color:#272838; font-size:10px;">50</span></div>
    <div style="flex:1; height:96px; background:#E0E1E6; padding:8px; display:flex; align-items:flex-end;"><span class="mono" style="color:#272838; font-size:10px;">100</span></div>
    <div style="flex:1; height:96px; background:#C1C3CC; padding:8px; display:flex; align-items:flex-end;"><span class="mono" style="color:#272838; font-size:10px;">200</span></div>
    <div style="flex:1; height:96px; background:#A2A5B3; padding:8px; display:flex; align-items:flex-end;"><span class="mono" style="color:#272838; font-size:10px;">300</span></div>

    <div style="flex:1; height:96px; background:#272838; padding:8px; display:flex; align-items:flex-end;"><span class="mono" style="color:#fff; font-size:10px;">800</span></div>
    <div style="flex:1; height:96px; background:#1A1C27; padding:8px; display:flex; align-items:flex-end;"><span class="mono" style="color:#fff; font-size:10px;">900</span></div>
  </div>
  <div class="label">Used for text, surfaces, borders, and the primary button.</div>
</div>
</body></html>
