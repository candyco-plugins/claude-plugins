<!doctype html><html><head><meta charset="utf-8"><title>Capsules</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .cap{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px;}
  .cap .dot{width:6px; height:6px; border-radius:50%;}
</style>
<div class="card">
  <div class="eyebrow">Capsules · Status pills</div>
  <div class="row" style="flex-wrap:wrap; gap:8px;">
    <span class="cap" style="background:#E8FAF0; color:#176B3A;"><span class="dot" style="background:#23CE6B;"></span>On track</span>
    <span class="cap" style="background:#FFF7DB; color:#7A5800;"><span class="dot" style="background:#FFCA3A;"></span>Approaching cap</span>
    <span class="cap" style="background:#FFE5E9; color:#A30016;"><span class="dot" style="background:#FF0022;"></span>At capacity</span>
    <span class="cap" style="background:#E3F1FB; color:#0B5180;"><span class="dot" style="background:#1982C4;"></span>Ramping</span>
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Draft</span>
    <span class="cap" style="background:#272838; color:white;">Featured</span>
  </div>
  <div class="row" style="flex-wrap:wrap; gap:8px;">
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Costco</span>
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Sam's Club</span>
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Trader Joe's</span>
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Kroger</span>
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Walmart</span>
    <span class="cap" style="background:#F2F2F4; color:#3A3D50;">Albertsons</span>
  </div>
</div>
</body></html>
