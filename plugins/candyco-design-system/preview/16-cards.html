<!doctype html><html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .stat-num {
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    font-stretch: 110%;
  }
</style>
<div class="card" style="background:#F5F5F5;">
  <div class="eyebrow">Cards</div>
  <div class="row" style="gap:14px; align-items:stretch;">
    <div style="flex:1; background:white; border:1px solid #E0E1E6; border-radius:10px; padding:18px; box-shadow:0 2px 4px rgba(39,40,56,0.08), 0 1px 2px rgba(39,40,56,0.04);">
      <div class="eyebrow" style="margin-bottom:8px;">Plant 07</div>
      <div class="stat-num">58%</div>
      <div style="margin-top:8px; font-size:13px; color:var(--fg-2);">Boise · Growing</div>
      <div style="margin-top:14px; height:6px; background:#E0E1E6; border-radius:999px; overflow:hidden;"><div style="width:58%; height:100%; background:linear-gradient(90deg,#5DDC92,#23CE6B);"></div></div>
    </div>
    <div style="flex:1; background:white; border:1px solid #E0E1E6; border-radius:10px; padding:18px; box-shadow:0 2px 4px rgba(39,40,56,0.08), 0 1px 2px rgba(39,40,56,0.04);">
      <div class="eyebrow" style="margin-bottom:8px;">Q3 commitment</div>
      <div class="stat-num">1.4<span style="color:var(--racing-red);">B</span></div>
      <div style="margin-top:8px; font-size:13px; color:var(--fg-2);">units allocated · 96% on-time</div>
      <div style="margin-top:14px; display:flex; gap:6px;"><span style="font-size:11px; padding:2px 8px; background:#E8FAF0; color:#176B3A; border-radius:999px; font-weight:600;">On track</span></div>
    </div>
    <div style="flex:1; background:#272838; color:white; border-radius:10px; padding:18px;">
      <div class="eyebrow" style="color:rgba(255,255,255,0.5); margin-bottom:8px;">Inverse</div>
      <div class="stat-num">12</div>
      <div style="margin-top:8px; font-size:13px; color:rgba(255,255,255,0.7);">plants · coast to coast</div>
      <div style="margin-top:14px;"><span style="font-size:11px; padding:2px 8px; background:#FFCA3A; color:#272838; border-radius:999px; font-weight:600;">Featured</span></div>
    </div>
  </div>
</div>
</body></html>
