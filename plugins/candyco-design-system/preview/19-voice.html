<!doctype html><html><head><meta charset="utf-8"><title>Voice</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .ex{display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border-radius:8px;}
  .ex.good{background:#E8FAF0;}
  .ex.bad{background:#FFE5E9;}
  .ex .mark{font-family:var(--font-mono); font-weight:700; font-size:13px;}
  .ex.good .mark{color:#176B3A;}
  .ex.bad .mark{color:#A30016;}
  .ex .copy{font-size:14px; color:var(--fg-1);}
</style>
<div class="card">
  <div class="eyebrow">Voice & tone</div>
  <div class="ex good"><span class="mark">✓</span><span class="copy">"Twelve plants. One partner. Every aisle."</span></div>
  <div class="ex good"><span class="mark">✓</span><span class="copy">"Lead times locked. Capacity allocated for Q3."</span></div>
  <div class="ex bad"><span class="mark">✗</span><span class="copy">"Sweeten your shelves with our magical confections!"</span></div>
  <div class="ex bad"><span class="mark">✗</span><span class="copy">"🍬 Yummy candy for everyone! 🍭"</span></div>
  <div class="label">Confident, plainspoken, slightly industrial. Numbers always concrete. No emoji.</div>
</div>
</body></html>
