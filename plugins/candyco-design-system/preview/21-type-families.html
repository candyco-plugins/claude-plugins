<!doctype html><html><head><meta charset="utf-8"><title>Type Families</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Brand families</div>
  <div style="display:grid; grid-template-columns:140px 1fr; gap:14px 18px; align-items:baseline;">
    <div class="mono">Yeseva One</div>
    <div style="font-family:'Yeseva One', serif; font-size:34px; line-height:1; letter-spacing:-0.005em;">Display headlines</div>
    <div class="mono">Frank Ruhl Libre</div>
    <div style="font-family:'Frank Ruhl Libre', serif; font-size:22px; line-height:1.2;">Editorial · pull quotes · long-form</div>
    <div class="mono">Assistant</div>
    <div style="font-family:'Assistant', sans-serif; font-size:20px; line-height:1.3;">UI · body · navigation · forms</div>
    <div class="mono">Minion Pro</div>
    <div style="font-family:'Minion Pro', serif; font-size:18px; line-height:1.3;">Legacy long-form (legal, archival)</div>
  </div>
</div>
</body></html>
