<!doctype html><html><head><meta charset="utf-8"><title>Surfaces</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Surfaces · Foreground & background</div>
  <div class="row" style="gap:12px;">
    <div style="flex:1; height:110px; background:#FFFFFF; border:1px solid var(--border-default); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-weight:600; font-size:13px;">bg-1 · page</span>
      <span class="mono">#FFFFFF</span>
    </div>
    <div style="flex:1; height:110px; background:#F5F5F5; border:1px solid var(--border-subtle); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-weight:600; font-size:13px;">bg-2 · cards</span>
      <span class="mono">#F5F5F5</span>
    </div>
    <div style="flex:1; height:110px; background:#E8E8E8; border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; justify-content:space-between;">
      <span style="font-weight:600; font-size:13px;">bg-3 · wells</span>
      <span class="mono">#E8E8E8</span>
    </div>
    <div style="flex:1; height:110px; background:#272838; border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; justify-content:space-between; color:white;">
      <span style="font-weight:600; font-size:13px;">bg-inverse</span>
      <span class="mono" style="color:rgba(255,255,255,0.7);">#272838</span>
    </div>
  </div>
</div>
</body></html>
