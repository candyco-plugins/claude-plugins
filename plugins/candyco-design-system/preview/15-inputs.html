<!doctype html><html><head><meta charset="utf-8"><title>Form Inputs</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .field{display:flex; flex-direction:column; gap:6px; flex:1;}
  .field label{font-size:12px; font-weight:600; color:var(--fg-2);}
  .field input, .field select{font-family:var(--font-sans); font-size:14px; padding:10px 12px; border:1px solid var(--border-strong); border-radius:6px; background:white; box-shadow:inset 0 1px 2px rgba(39,40,56,0.08); outline:none;}
  .field input:focus{border-color:#1982C4; box-shadow:0 0 0 3px rgba(25,130,196,0.25);}
  .field.error input{border-color:#FF0022;}
  .field.error .hint{color:#A30016;}
  .hint{font-size:12px; color:var(--fg-3);}
</style>
<div class="card">
  <div class="eyebrow">Form inputs</div>
  <div class="row" style="gap:14px; align-items:flex-start;">
    <div class="field"><label>Forecast units / wk</label><input value="142,800"><div class="hint">Used for line allocation</div></div>
    <div class="field"><label>Retailer</label><select><option>Costco</option></select></div>
    <div class="field error"><label>Lead time (days)</label><input value="-3" style="border-color:#FF0022;"><div class="hint">Must be a positive integer</div></div>
  </div>
</div>
</body></html>
