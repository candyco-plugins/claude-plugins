<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css"></head><body>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<div class="card">

  <div class="row" style="gap:24px; flex-wrap:wrap; color:#272838;">
    <i data-lucide="factory" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="truck" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="package" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="boxes" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="bar-chart-3" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="line-chart" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="clipboard-check" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="shield-check" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="circle-check" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="circle-alert" style="width:28px; height:28px; stroke-width:1.5;"></i>

    <i data-lucide="users" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="building-2" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="map-pin" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="calendar" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="search" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="arrow-right" style="width:28px; height:28px; stroke-width:1.5;"></i>
    <i data-lucide="download" style="width:28px; height:28px; stroke-width:1.5;"></i>
  </div>
  <div class="label">Inherits <span class="mono">currentColor</span>. Sizes: 16/20/24/32/48.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
