<!doctype html><html><head><meta charset="utf-8"><title>Mono Type</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Tabular · Assistant SemiBold (tnum-style spec)</div>
  <table style="width:100%; border-collapse:collapse; font-family:var(--font-sans); font-size:13px;">
    <thead>
      <tr style="border-bottom:1px solid var(--border-default);">
        <th style="text-align:left; padding:8px 4px; color:var(--fg-3); font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;">SKU</th>
        <th style="text-align:left; padding:8px 4px; color:var(--fg-3); font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;">Lot</th>

        <th style="text-align:right; padding:8px 4px; color:var(--fg-3); font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;">Yield</th>
      </tr>
    </thead>
    <tbody style="font-variant-numeric: tabular-nums;">
      <tr style="border-bottom:1px solid var(--border-subtle);"><td style="padding:8px 4px; font-weight:600;">CC-7841-22</td><td style="padding:8px 4px;">L-2426-A</td><td style="padding:8px 4px; text-align:right;">142,800</td><td style="padding:8px 4px; text-align:right; color:#176B3A; font-weight:600;">98.7%</td></tr>
      <tr style="border-bottom:1px solid var(--border-subtle);"><td style="padding:8px 4px; font-weight:600;">CC-9120-04</td><td style="padding:8px 4px;">L-2426-B</td><td style="padding:8px 4px; text-align:right;">96,400</td><td style="padding:8px 4px; text-align:right; color:#176B3A; font-weight:600;">99.2%</td></tr>
      <tr><td style="padding:8px 4px; font-weight:600;">CC-3055-19</td><td style="padding:8px 4px;">L-2427-A</td><td style="padding:8px 4px; text-align:right;">214,000</td><td style="padding:8px 4px; text-align:right; color:#7A5800; font-weight:600;">94.1%</td></tr>
    </tbody>
  </table>
  <div class="label">Tabular numerals via <span class="mono">font-variant-numeric: tabular-nums</span>.</div>
</div>
</body></html>
