<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .btn{display:inline-flex; align-items:center; gap:8px; font-family:var(--font-sans); font-size:14px; font-weight:600; padding:10px 18px; border-radius:10px; border:1px solid transparent; cursor:pointer; transition:all 200ms cubic-bezier(0.2,0,0,1);}
  .btn-primary{background:#272838; color:white;}
  .btn-primary:hover{background:#1A1C27;}
  .btn-secondary{background:white; color:#272838; border-color:#C1C3CC;}
  .btn-secondary:hover{background:#F5F5F5;}
  .btn-ghost{background:transparent; color:#272838;}
  .btn-ghost:hover{background:#F2F2F4;}
  .btn-danger{background:#FF0022; color:white;}
  .btn-link{background:transparent; color:#1982C4; padding:0; text-decoration:underline;}
</style>
<div class="card">
  <div class="eyebrow">Buttons</div>
  <div class="row" style="gap:12px; flex-wrap:wrap;">
    <button class="btn btn-primary">Allocate capacity</button>
    <button class="btn btn-secondary">Download spec</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">Halt line</button>
    <button class="btn btn-link">View details →</button>
  </div>
  <div class="row" style="gap:12px; flex-wrap:wrap;">
    <button class="btn btn-primary" style="font-size:13px; padding:8px 14px;">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary" style="font-size:15px; padding:14px 22px;">Large</button>
    <button class="btn btn-primary" disabled style="opacity:0.4; cursor:not-allowed;">Disabled</button>
  </div>
</div>
</body></html>
