<!doctype html><html><head><meta charset="utf-8"><title>Semantic Colors</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Semantic · Status</div>
  <div class="row" style="gap:12px;">
    <div style="flex:1; padding:14px 16px; background:#E8FAF0; border-radius:var(--radius); border:1px solid rgba(35,206,107,0.25);">
      <div style="display:flex; align-items:center; gap:8px;"><span style="width:8px; height:8px; border-radius:50%; background:#23CE6B;"></span><span style="font-weight:600; font-size:13px; color:#176B3A;">Success</span></div>
      <div class="mono" style="margin-top:6px; color:#176B3A;">#23CE6B</div>
    </div>
    <div style="flex:1; padding:14px 16px; background:#FFF7DB; border-radius:var(--radius); border:1px solid rgba(255,202,58,0.4);">
      <div style="display:flex; align-items:center; gap:8px;"><span style="width:8px; height:8px; border-radius:50%; background:#FFCA3A;"></span><span style="font-weight:600; font-size:13px; color:#7A5800;">Warning</span></div>
      <div class="mono" style="margin-top:6px; color:#7A5800;">#FFCA3A</div>
    </div>
    <div style="flex:1; padding:14px 16px; background:#FFE5E9; border-radius:var(--radius); border:1px solid rgba(255,0,34,0.25);">
      <div style="display:flex; align-items:center; gap:8px;"><span style="width:8px; height:8px; border-radius:50%; background:#FF0022;"></span><span style="font-weight:600; font-size:13px; color:#A30016;">Error</span></div>
      <div class="mono" style="margin-top:6px; color:#A30016;">#FF0022</div>
    </div>
    <div style="flex:1; padding:14px 16px; background:#E3F1FB; border-radius:var(--radius); border:1px solid rgba(25,130,196,0.25);">
      <div style="display:flex; align-items:center; gap:8px;"><span style="width:8px; height:8px; border-radius:50%; background:#1982C4;"></span><span style="font-weight:600; font-size:13px; color:#0B5180;">Info</span></div>
      <div class="mono" style="margin-top:6px; color:#0B5180;">#1982C4</div>
    </div>
  </div>
</div>
</body></html>
